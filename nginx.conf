# Production Nginx configuration for Angular 18 SSR static prerendered site

server {
    listen 80;
    server_name _;
    charset utf-8;

    # Root directory for static files
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback - all routes go to index.html for Angular router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No cache for index.html (ensures updates propagate immediately)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Long cache for hashed Angular assets (JS, CSS, fonts)
    location ~* \.(js|css|woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/css
        application/javascript
        application/json
        application/x-javascript
        text/javascript
        text/xml
        text/plain
        image/svg+xml
        application/xml
        application/xml+rss;

    # Security headers on all responses
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Deny access to hidden files (except well-known for letsencrypt)
    location ~ /\.(?!well-known) {
        deny all;
    }
}
