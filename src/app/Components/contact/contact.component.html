<section class="contact-section">
  <div class="container">
    <div class="section-header text-center">
      <h2 class="section-title">Contacto</h2>
      <span class="section-bar mx-auto"></span>
      <p class="section-subtitle mx-auto">No dudes en contactarme para cualquier consulta o proyecto.</p>
    </div>
    <div class="contact-grid">
      <div class="contact-info" data-aos="fade-right">
        <div class="info-card">
          <div class="info-row">
            <div class="info-icon"><i class="bi bi-geo-alt-fill"></i></div>
            <div>
              <span class="info-label">Direccion</span>
              <span class="info-value">Requinoa, Rancagua, Chile</span>
            </div>
          </div>
          <div class="info-row">
            <div class="info-icon"><i class="bi bi-telephone-fill"></i></div>
            <div>
              <span class="info-label">Telefono</span>
              <span class="info-value">+569 3250 7495</span>
            </div>
          </div>
          <div class="info-row">
            <div class="info-icon"><i class="bi bi-envelope-fill"></i></div>
            <div>
              <span class="info-label">Email</span>
              <span class="info-value">jjosemiguel.jv&#64;gmail.com</span>
            </div>
          </div>
        </div>
        <div class="map-wrapper">
          <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3162.9200000000005!2d-70.74100000000001!3d-34.165000000000006!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzTCsDA5JzU0LjAiUyA3MMKwNDQnMjguMCJX!5e0!3m2!1sen!2scl!4v1630000000000!5m2!1sen!2scl" width="100%" height="220" style="border:0; border-radius: 12px;" allowfullscreen="" loading="lazy"></iframe>
        </div>
      </div>
      <div class="contact-form-wrapper" data-aos="fade-left">
        <form (ngSubmit)="onSubmit()" #contactForm="ngForm" class="contact-form">
          <div class="form-row">
            <div class="form-group">
              <label for="name">Nombre</label>
              <input type="text" id="name" name="name" [(ngModel)]="contact.name" required placeholder="Tu nombre" class="form-control">
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" [(ngModel)]="contact.email" required placeholder="Tu email" class="form-control">
            </div>
          </div>
          <div class="form-group">
            <label for="subject">Asunto</label>
            <input type="text" id="subject" name="subject" [(ngModel)]="contact.subject" required placeholder="Asunto" class="form-control">
          </div>
          <div class="form-group">
            <label for="message">Mensaje</label>
            <textarea id="message" name="message" [(ngModel)]="contact.message" rows="5" required placeholder="Tu mensaje" class="form-control"></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-submit" [disabled]="!contactForm.valid">
            <i class="bi bi-send me-2"></i>Enviar Mensaje
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
