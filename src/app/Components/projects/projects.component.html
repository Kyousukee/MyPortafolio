<section class="projects-section">
  <div class="container">
    <div class="section-header text-center">
      <h2 class="section-title">Proyectos</h2>
      <span class="section-bar mx-auto"></span>
      <p class="section-subtitle mx-auto">Algunos de mis proyectos. Te invito a revisarlos para conocer mi trabajo.</p>
    </div>
    <div class="projects-grid">
      <div class="project-card" data-aos="fade-up" *ngFor="let project of projects">
        <div class="project-image">
          <div id="{{project.id}}-carousel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
              <div class="carousel-item" *ngFor="let image of project.images; let i = index" [ngClass]="{'active': i === 0}">
                <img [src]="image.src" class="d-block w-100" alt="{{image.title}}" (click)="openModal(image)">
              </div>
            </div>
            <button class="carousel-control-prev" type="button" [attr.data-bs-target]="'#' + project.id + '-carousel'" data-bs-slide="prev">
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            </button>
            <button class="carousel-control-next" type="button" [attr.data-bs-target]="'#' + project.id + '-carousel'" data-bs-slide="next">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
            </button>
          </div>
        </div>
        <div class="project-info">
          <h5>{{project.name}}</h5>
          <p class="project-tech">{{project.technologies}}</p>
          <div class="project-actions">
            <div *ngIf="project.codeSourceUrl && project.codeSourceUrl.length" class="code-links">
              <ng-container *ngFor="let url of project.codeSourceUrl">
                <a [href]="url" target="_blank" class="btn-code">
                  <i class="bi bi-github me-1"></i>Codigo
                </a>
              </ng-container>
            </div>
            <button (click)="detailOnClick(project)" class="btn-detail-toggle">
              <span *ngIf="!project.detailIsDisplayed"><i class="bi bi-chevron-down me-1"></i>Detalle</span>
              <span *ngIf="project.detailIsDisplayed"><i class="bi bi-chevron-up me-1"></i>Ocultar</span>
            </button>
          </div>
          <div *ngIf="project.detailIsDisplayed" class="project-detail" [innerHTML]="project.detail"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="image-modal" *ngIf="isModalOpen" (click)="closeModal()">
    <div class="image-modal-content" (click)="$event.stopPropagation()">
      <button class="modal-close" (click)="closeModal()"><i class="bi bi-x-lg"></i></button>
      <img [src]="selectedImage?.src" [alt]="selectedImage?.title">
    </div>
  </div>
</section>
